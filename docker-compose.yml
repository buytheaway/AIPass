services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aipass
      POSTGRES_USER: aipass
      POSTGRES_PASSWORD: aipass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipass -d aipass"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://aipass:aipass@postgres:5432/aipass?sslmode=disable", "up"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4318:4318"

  access-api:
    build:
      context: .
      dockerfile: Dockerfile.access-api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: access-api
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://aipass:aipass@postgres:5432/aipass?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /app/deployments/docker/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/deployments/docker/keys/public.pem
    ports:
      - "8080:8080"

  scanner-gateway:
    build:
      context: .
      dockerfile: Dockerfile.scanner-gateway
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      redpanda:
        condition: service_started
    environment:
      APP_NAME: scanner-gateway
      HTTP_ADDR: :8081
      DATABASE_URL: postgres://aipass:aipass@postgres:5432/aipass?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8081:8081"

  notification-report-service:
    build:
      context: .
      dockerfile: Dockerfile.notification-report-service
    depends_on:
      redpanda:
        condition: service_started
    environment:
      APP_NAME: notification-report-service
      KAFKA_BROKERS: redpanda:9092

volumes:
  postgres_data:
  minio_data:

