services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aipass
      POSTGRES_USER: aipass
      POSTGRES_PASSWORD: aipass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipass -d aipass"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redpanda:
    image: redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  access-api:
    build:
      context: .
      dockerfile: Dockerfile.access-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: access-api
      APP_ENV: local
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://aipass:aipass@postgres:5432/aipass?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /app/deployments/docker/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/deployments/docker/keys/public.pem
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  minio_data:

